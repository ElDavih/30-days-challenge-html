<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./index.css" />
    <title>Challenge - Dia 28</title>
  </head>
  <body>
    <!-- Crea un mensaje emergente al pulsar un botón, que desaparezca al pulsar fuera del mensaje. -->
    <button commandfor="modal" command="show-modal">Abrir modal</button>
    <dialog id="modal">
      <h3>Soporte de la etiqueta dialog</h3>
      <p>
        The “dialog” element is not supported in all browsers. Please be sure to test, and consider
        using a polyfill. Bad value “dialog” for attribute “method” on element “form”.
      </p>
      <button commandfor="modal" command="close">Cerrar Modal</button>
    </dialog>
  </body>
</html>
