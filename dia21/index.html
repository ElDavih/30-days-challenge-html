<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Challenge - Dia 21</title>
  </head>
  <body>
    <!-- Crea una lista desplegable donde se pueda seleccionar entre 3 grupos de productos ficticios. -->
    <select name="fruit" id="list-fruit">
      <option disabled selected>---Selecciona tu tipo de fruta favorita:---</option>

      <optgroup label="Frutas Ácidas">
        <option value="1">🥝 Kiwi</option>
        <option value="2">🍋 Limón</option>
        <option value="3">🍍 Piña</option>
        <option value="4">🍊 Naranja</option>
      </optgroup>

      <optgroup label="Frutas Dulces">
        <option value="5">🍌 Plátano</option>
        <option value="6">🍒 Cereza</option>
        <option value="7">🍈 Melón</option>
        <option value="8">🍉 Sandía</option>
      </optgroup>

      <optgroup label="Frutas Neutras">
        <option value="9">🥥 Coco</option>
        <option value="10">🥑 Aguacate</option>
        <option value="11">🥜 Maní</option>
        <option value="12">🌰 Nuez</option>
      </optgroup>
    </select>
  </body>
</html>
