<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Challenge - Dia 26</title>
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <!-- Crea un mensaje emergente al pulsar un botón, que desaparezca al pulsar fuera del mensaje. -->
    <button popovertarget="alert" popovertargetaction="toogle">Mensaje emergente</button>
    <div id="alert" popover="manual">
      <p>
        Attribute <strong>“popovertarget”</strong> not allowed on element
        <strong>“button”</strong> at this point. Attribute
        <strong>“popovertargetaction”</strong> not allowed on element <strong>“button”</strong> at
        this point. Attribute <strong>“popover”</strong> not allowed on element “div” at this point.
      </p>
    </div>
  </body>
</html>
